<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ canal.nome_canal }} - WebRTC Viewer</title>
    
    <!-- Importando Bootstrap para que a classe 'btn' e as margens funcionem -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita barras de rolagem indesejadas na visualização */
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0" style="height: 100vh; display: flex; flex-direction: column;">
        <!-- Cabeçalho estilo OneNote -->
        <div class="p-3 shadow-sm d-flex justify-content-between align-items-center" 
             style="background-color: {{ canal.cor_fundo }}; color: {{ canal.cor_texto }};">
            
            <h3 style="font-weight: bold; font-family: {{ canal.fonte }}; margin: 0;">
                {{ canal.nome_canal }}
            </h3>
            
            <a href="{{ url_for('webrtc.dashboard') }}" class="btn btn-sm btn-dark">
                Sair do Canal
            </a>
        </div>

        <!-- IFRAME DO WEBRTC (Ocupa o resto da tela) -->
        <div style="flex-grow: 1; background-color: #000;">
            <iframe src="{{ canal.url_iframe }}" 
                    style="width: 100%; height: 100%; border: none;" 
                    allow="camera; microphone; fullscreen; display-capture">
            </iframe>
        </div>
    </div>

</body>
</html>
